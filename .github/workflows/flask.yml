name: Flask Build and Test 
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies 
      run: |
        pip install -r requirements.txt
    - name: Run linter 
      run: flake8 . --ignore=E501,W293
    - name: Run tests
      run: pytest


